name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  pomelo-be:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pomelo-BE
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pomelo-BE/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  pomelo-fe:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pomelo-FE
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://localhost:4000
      AUTH_API_BASE_URL: http://localhost:8082
      AUTH_JWT_SECRET: dev-super-secret-key-change-me
      NEXT_PUBLIC_WHATSAPP_PHONE: "5490000000000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pomelo-FE/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  authms:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AuthMS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore src/AuthMS.Api/AuthMS.Api.csproj
      - run: dotnet build src/AuthMS.Api/AuthMS.Api.csproj --configuration Release --no-restore

  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml -f docker-compose.proxy.yml config
